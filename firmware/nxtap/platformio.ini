; ============================================================
; NXTUP — NXT TAP firmware
; Target hardware: Waveshare ESP32-S3-Touch-LCD-4.3
;   - ESP32-S3-WROOM-1-N16R8 (16MB flash, 8MB PSRAM)
;   - 800×480 RGB LCD parallel
;   - GT911 capacitive touch (I2C)
; ============================================================

[platformio]
default_envs = waveshare_4_3
src_dir = src
include_dir = include

[env:waveshare_4_3]
; Use the pioarduino fork — it ships Arduino-ESP32 v3.x which is required
; by the current Arduino_GFX library (it includes esp32-hal-periman.h
; that does not exist in the older v2.x core that ships with the
; default espressif32 platform).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; Flash + PSRAM config for ESP32-S3-WROOM-1-N16R8
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

build_flags =
  -DBOARD_HAS_PSRAM
  ; Serial via UART0 (the CH343 USB-Serial bridge on the "UART" port).
  ; ARDUINO_USB_CDC_ON_BOOT=0 keeps `Serial` pointed at UART0 instead
  ; of the native USB CDC, which lives on the separate "USB" port.
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -I include
  ; LVGL: tell its build to pick up our lv_conf.h from the include dir.
  -DLV_CONF_INCLUDE_SIMPLE=1
  -DLV_LVGL_H_INCLUDE_SIMPLE=1

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
; If auto-detect fails, uncomment and set explicit port:
; upload_port = COM5
; monitor_port = COM5

lib_deps =
  ; Display + GFX — supports the ESP32-S3 RGB LCD parallel interface natively
  https://github.com/moononournation/Arduino_GFX.git
  ; Capacitive touch driver for GT911 (Phase B)
  https://github.com/TAMCTec/gt911-arduino.git
  ; JSON parsing for the device snapshot / state endpoints (Phase D)
  bblanchon/ArduinoJson @ ^7.0.0
  ; LVGL — widget-based UI toolkit (Phase G)
  lvgl/lvgl @ ^9.2.0
